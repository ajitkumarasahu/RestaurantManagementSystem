# Database connection URL
# jdbc:mysql://localhost:3306/restaurant_db
# - jdbc:mysql → MySQL database driver
# - localhost → database is running on your local machine
# - 3306 → default MySQL port
# - restaurant_db → name of the database
db.url=jdbc:mysql://localhost:3306/restaurant_db

# Database username (used to log in to MySQL)
db.username=root

# Database password (used to log in to MySQL)
db.password=

# Secret key used for signing JWT (JSON Web Tokens)
# This should be kept secure and not exposed publicly
jwt.secret=restaurant_secret_key_12345

# JWT expiration time in milliseconds
# 86400000 ms = 24 hours (1 day)
# After this time, the token becomes invalid
jwt.expiration=86400000